<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout.html}">
<head><title>Danh sách khóa học</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold"><i class="fa-solid fa-list"></i> Danh sách khóa học</h2>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check"></i> <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-triangle-exclamation"></i> <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/course/list}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Trình độ:</label>
                    <select name="level" class="form-select">
                        <option value="All" th:selected="${selectedLevel == 'All'}">Tất cả trình độ</option>
                        <option value="Beginner" th:selected="${selectedLevel == 'Beginner'}">Beginner</option>
                        <option value="Intermediate" th:selected="${selectedLevel == 'Intermediate'}">Intermediate</option>
                        <option value="Advanced" th:selected="${selectedLevel == 'Advanced'}">Advanced</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">Học phí tối đa (VNĐ):</label>
                    <input type="number" name="maxPrice" class="form-control" th:value="${maxPrice}" step="500000">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-filter"></i> Lọc dữ liệu</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(courses)}" class="alert alert-warning text-center fw-bold">
        <i class="fa-solid fa-box-open fs-4 d-block mb-2"></i>
        Hiện chưa có lớp học phù hợp với yêu cầu của bạn!
    </div>

    <div class="table-responsive shadow-sm" th:unless="${#lists.isEmpty(courses)}">
        <table class="table table-hover table-bordered table-striped align-middle text-center mb-0">
            <thead class="table-dark">
            <tr>
                <th>Mã KH</th>
                <th>Tên khóa</th>
                <th>Trình độ</th>
                <th>Học phí</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${courses}">
                <td class="fw-bold text-secondary" th:text="${c.code}"></td>
                <td class="text-start fw-bold text-primary" th:text="${c.name}"></td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${c.level}"></span>
                </td>
                <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(c.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td>
                    <a th:href="@{/course/detail/{id}(id=${c.code})}" class="btn btn-sm btn-outline-primary" title="Xem"><i class="fa-solid fa-eye"></i></a>
                    <a th:href="@{/course/edit/{id}(id=${c.code})}" class="btn btn-sm btn-outline-warning" title="Sửa"><i class="fa-solid fa-pen-to-square"></i></a>

                    <form th:action="@{/course/delete/{id}(id=${c.code})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Hủy" onclick="return confirm('Bạn có chắc muốn hủy khóa này?');">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
