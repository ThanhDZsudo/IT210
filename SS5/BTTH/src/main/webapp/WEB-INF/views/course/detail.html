<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout.html}">
<head><title>Chi tiết lộ trình</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="fa-solid fa-book-open"></i> Chi tiết khóa học</h4>
                </div>
                <div class="card-body p-4">
                    <h3 class="card-title text-center text-uppercase fw-bold text-primary mb-4" th:text="${course.name}"></h3>

                    <ul class="list-group list-group-flush mb-4 fs-5">
                        <li class="list-group-item"><strong>Mã khóa học:</strong> <span class="text-muted" th:text="${course.code}"></span></li>
                        <li class="list-group-item"><strong>Giảng viên phụ trách:</strong> <span class="text-muted" th:text="${course.teacher}"></span></li>
                        <li class="list-group-item"><strong>Thời lượng học:</strong> <span class="text-muted" th:text="${course.duration}"></span></li>
                        <li class="list-group-item"><strong>Lộ trình đào tạo:</strong> <span class="text-muted" th:text="${course.description}"></span></li>
                    </ul>

                    <div class="text-center mt-3 p-3 bg-light rounded">
                        <h4 th:if="${course.full}" class="text-danger fw-bold mb-0">
                            <i class="fa-solid fa-ban"></i> ĐÃ HẾT CHỖ
                        </h4>
                        <h4 th:unless="${course.full}" class="text-success fw-bold mb-0">
                            <i class="fa-solid fa-circle-check"></i> Còn chỗ trống
                            <span class="badge bg-success ms-2" th:text="${course.studentCount} + ' / ' + ${course.maxStudents} + ' HV'"></span>
                        </h4>
                    </div>
                </div>
                <div class="card-footer bg-white text-center py-3">
                    <a th:href="@{/course/list}" class="btn btn-secondary px-4"><i class="fa-solid fa-arrow-left"></i> Quay lại danh sách</a>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
