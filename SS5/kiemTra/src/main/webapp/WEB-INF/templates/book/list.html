<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Sách</title>
    <style>
        body { margin: 0; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment('Danh sách Ấn phẩm')}"></div>

<div class="container">
    <table>
        <thead>
        <tr>
            <th>Mã số</th>
            <th>Tên Sách</th>
            <th>Giá bán (VNĐ)</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${books}" th:classappend="${b.price >= 300000} ? 'highlight-expensive' : ''">
            <td th:text="${b.id}"></td>
            <td style="text-align: left;" th:text="${b.title}"></td>
            <td th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
            <td>
                <a th:href="@{/books/{id}(id=${b.id})}">Chi tiết</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/footer :: footerFragment}"></div>
</body>
</html>
