<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Sách</title>
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment('Thông tin chi tiết: ' + ${book.title})}"></div>

<div >
    <div th:if="${book != null}">
        <div class="info"><strong>Mã số:</strong> <span th:text="${book.id}"></span></div>
        <div class="info"><strong>Tên sách:</strong> <span th:text="${book.title}"></span></div>
        <div class="info"><strong>Tác giả:</strong> <span th:text="${book.author}"></span></div>
        <div class="info">
            <strong>Giá bán:</strong>
            <span th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
        </div>
    </div>

    <div th:if="${book == null}">
        <h2>Không tìm thấy cuốn sách này!</h2>
    </div>

    <div>
        <a th:href="@{/books}" >Quay lại danh sách</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footerFragment}"></div>
</body>
</html>
